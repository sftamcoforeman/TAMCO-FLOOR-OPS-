  },
  async set(key, value) {

      localStorage.setItem(key, value);

    } catch {
      return null;
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return { key, deleted: true };
    } catch {
      return null;

  },
};

function downloadCsv(filename, rows, columns) {
  const escape = (val) => {
    if (val === null || val === undefined) return '';
    const s = String(val);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  const header = columns.map((c) => escape(c.label)).join(',');
  const lines = rows.map((row) => columns.map((c) => escape(c.get(row))).join(','));
  const csv = [header, ...lines].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}
function isThisWeek(ts) {
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  return Date.now() - ts <= weekMs;
}

// Shift boundaries (24h, minutes from midnight)
const SHIFT_BOUNDARIES = [
  { name: 'Day', startMin: 7 * 60 + 30, endMin: 15 * 60 + 30 },
  { name: 'Afternoon', startMin: 15 * 60 + 30, endMin: 23 * 60 + 30 },
  { name: 'Midnight', startMin: 23 * 60 + 30, endMin: 7 * 60 + 30 }, // crosses midnight
];

function dateAtMinutes(baseDate, minutes) {
  const d = new Date(baseDate);
  d.setHours(0, 0, 0, 0);
  d.setMinutes(minutes);
  return d;
}

// Returns { name, start: Date, end: Date } for the most recently COMPLETED shift,
// relative to "now". Handles the Midnight shift's wraparound across the date line.
function getJustEndedShift(now = new Date()) {
  const nowMin = now.getHours() * 60 + now.getMinutes();

  // Build today's three shift windows as absolute Date ranges, anchored to "now"'s calendar day,
  // accounting for Midnight shift starting the previous day when relevant.
  const candidates = [];

  for (const b of SHIFT_BOUNDARIES) {
    if (b.startMin < b.endMin) {
      // same-day shift (Day, Afternoon)
      const start = dateAtMinutes(now, b.startMin);
      const end = dateAtMinutes(now, b.endMin);
      candidates.push({ name: b.name, start, end });
      // also consider yesterday's instance, in case "now" is early morning before any shift ended today
      const startPrev = new Date(start); startPrev.setDate(startPrev.getDate() - 1);
      const endPrev = new Date(end); endPrev.setDate(endPrev.getDate() - 1);
      candidates.push({ name: b.name, start: startPrev, end: endPrev });
    } else {
      // overnight shift (Midnight): could end today (started yesterday) or end tomorrow (started today)
      const startToday = dateAtMinutes(now, b.startMin);
      const endTomorrow = dateAtMinutes(now, b.endMin);
      endTomorrow.setDate(endTomorrow.getDate() + 1);
      candidates.push({ name: b.name, start: startToday, end: endTomorrow });

      const startYesterday = new Date(startToday); startYesterday.setDate(startYesterday.getDate() - 1);
      const endToday = dateAtMinutes(now, b.endMin);
      candidates.push({ name: b.name, start: startYesterday, end: endToday });
    }
  }

  // Keep only shifts that have already ended (end <= now), pick the most recent one
  const ended = candidates.filter((c) => c.end.getTime() <= now.getTime());
  ended.sort((a, b) => b.end.getTime() - a.end.getTime());
  return ended[0] || candidates[0];
}

function formatShiftWindow(start, end) {
  const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
  return `${start.toLocaleString('en-US', opts)} \u2013 ${end.toLocaleString('en-US', opts)}`;
}

function fileToCompressedDataUrl(file, maxDim = 640, quality = 0.55) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let tesseractLoadPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js';
    script.onload = () => resolve(window.Tesseract);
    script.onerror = () => reject(new Error('Failed to load OCR library'));
    document.head.appendChild(script);
  });
  return tesseractLoadPromise;
}

// Look for a plausible lot/P.O./order-style number in raw OCR text:
// a run of 5+ digits, optionally with a dash-suffix (e.g. "1582372" or "6060047-003").
function extractLikelyLotCandidates(rawText) {
  const matches = rawText.match(/\b\d{5,}(-\d{2,4})?\b/g) || [];
  // de-dupe, keep order of first appearance, cap at 5 suggestions
  const seen = new Set();
  const out = [];
  for (const m of matches) {
    if (!seen.has(m)) {
      seen.add(m);
      out.push(m);
    }
    if (out.length >= 5) break;
  }
  return out;
}

function PhotoCaptureWithOCR({ photos, onChange, onLotCandidates }) {
  const inputRef = useRef(null);
  const [ocrStatus, setOcrStatus] = useState('idle');
  const photoList = Array.isArray(photos) ? photos : [];

  const runOcr = async (dataUrl) => {
    setOcrStatus('loading');
    try {
      const Tesseract = await loadTesseract();
      setOcrStatus('running');
      const result = await Tesseract.recognize(dataUrl, 'eng');
      const text = (result && result.data && result.data.text) || '';
      const candidates = extractLikelyLotCandidates(text);
      onLotCandidates(candidates);
      setOcrStatus('done');
    } catch {
      setOcrStatus('error');
      onLotCandidates([]);
    }
  };

  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" style={{ display: 'none' }}
        onChange={async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          try {
            const dataUrl = await fileToCompressedDataUrl(file, 1100, 0.75);
            onChange([...photoList, dataUrl]);
            runOcr(dataUrl);
          } catch { }
          e.target.value = '';
        }}
      />
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
        {photoList.map((p, i) => (
          <div key={i} style={{ position: 'relative', display: 'inline-block' }}>
            <img src={p} alt={`tag ${i + 1}`} style={{ width: 100, height: 100, objectFit: 'cover', borderRadius: 10, border: `2px solid ${LIGHT_BG}` }} />
            <button type="button" className="tap-target"
              onClick={() => { onChange(photoList.filter((_, j) => j !== i)); onLotCandidates([]); setOcrStatus('idle'); }}
              style={{ position: 'absolute', top: -8, right: -8, width: 28, height: 28, borderRadius: '50%', background: RED, color: '#fff', border: '2px solid #fff', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>
              ×
            </button>
          </div>
        ))}
        {photoList.length < MAX_PHOTOS && (
          <button type="button" className="tap-target" onClick={() => inputRef.current && inputRef.current.click()}
            style={{ width: 100, height: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, borderRadius: 10, border: `2px dashed ${MID_BLUE}`, background: LIGHT_BG, color: MID_BLUE, fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
            <span style={{ fontSize: 22 }}>📷</span>
            {photoList.length === 0 ? 'Photo of tag' : `Add (${photoList.length}/${MAX_PHOTOS})`}
          </button>
        )}
      </div>
      {(ocrStatus === 'loading' || ocrStatus === 'running') && (
        <div style={{ fontSize: 12.5, color: MID_BLUE, fontWeight: 600, marginTop: 8 }}>📖 Reading tag for lot/P.O. numbers...</div>
      )}
      {ocrStatus === 'error' && (
        <div style={{ fontSize: 12.5, color: AMBER, fontWeight: 600, marginTop: 8 }}>Couldn't read tag automatically — type the number below.</div>
      )}
    </div>
  );
}

function PhotoThumb({ storageKey, alt }) {
  const [src, setSrc] = useState(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const result = await storage.get(storageKey);
        if (!cancelled) {
          if (result && result.value) setSrc(result.value);
          else setFailed(true);
        }
      } catch {
        if (!cancelled) setFailed(true);
      }
    })();
    return () => { cancelled = true; };
  }, [storageKey]);

  if (failed) return null;
  if (!src) {
    return (
      <div style={{ width: 100, height: 100, borderRadius: 10, marginTop: 8, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: MID_BLUE }}>
        loading...
      </div>
    );
  }
  return <img src={src} alt={alt} style={{ width: 100, height: 100, objectFit: 'cover', borderRadius: 10, marginTop: 8, border: `2px solid ${LIGHT_BG}` }} />;
}

function PinGate({ unlocked, setUnlocked, label, adminPin }) {
  const [pin, setPin] = useState('');
  const [pinError, setPinError] = useState(false);
  if (unlocked) return null;
  const tryUnlock = () => {
    if (pin === adminPin) {
      setUnlocked(true);
      setPinError(false);
    } else {
      setPinError(true);
      setTimeout(() => setPinError(false), 1200);
    }
  };
  return (
    <div style={{ background: '#fff', borderRadius: 14, padding: 28, textAlign: 'center', maxWidth: 320, margin: '40px auto', boxShadow: '0 1px 3px rgba(27,58,107,0.08)' }}>
      <div style={{ fontSize: 16, fontWeight: 800, color: NAVY, marginBottom: 4 }}>Admin only</div>
      <div style={{ fontSize: 13, color: MID_BLUE, marginBottom: 18 }}>{label}</div>
      <input
        type="password"
        inputMode="numeric"
        value={pin}
        onChange={(e) => setPin(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && tryUnlock()}
        placeholder="PIN"
        style={{
          width: '100%', fontSize: 18, textAlign: 'center', letterSpacing: 4, padding: '12px',
          borderRadius: 10, border: `2px solid ${pinError ? RED : LIGHT_BG}`, boxSizing: 'border-box', marginBottom: 14,
        }}
      />
      <button
        type="button"
        className="tap-target"
        onClick={tryUnlock}
        style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: NAVY, color: '#fff', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}
      >
        Unlock
      </button>
      {pinError && <div style={{ color: RED, fontSize: 13, marginTop: 10 }}>Wrong PIN</div>}
    </div>
  );
}

        {tab === 'recognition' && <RecognitionTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'quality' && <QualityTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'ehs' && <EhsTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'production' && <ProductionTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'notes' && <NotesTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'handover' && <HandoverTab supervisor={supervisor} />}
        {tab === 'masteradmin' && <MasterAdminTab adminPin={ADMIN_PIN} />}
      </div>
      <VersionFooter />
    </div>
  );
}

function RecognitionTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [name, setName] = useState('');
  const [tags, setTags] = useState([]);
  const [note, setNote] = useState('');
  const [expanded, setExpanded] = useState(false);
  const [points, setPoints] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('recognitions');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('recognitions', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const toggleTag = (tag) => setTags((p) => (p.includes(tag) ? p.filter((t) => t !== tag) : [...p, tag]));
  const resetForm = () => { setName(''); setTags([]); setNote(''); setPoints(null); setExpanded(false); };
  const canSubmit = supervisor && name.trim().length > 0 && tags.length > 0;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const entry = { id: uid('r'), employeeName: name.trim(), shift, supervisor, tags, note: note.trim(), points: points || null, ts: Date.now() };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const totalsByEmployee = entries.reduce((acc, e) => {
    if (!e.points) return acc;
    acc[e.employeeName] = (acc[e.employeeName] || 0) + e.points;
    return acc;
  }, {});
  const sortedTotals = Object.entries(totalsByEmployee).sort((a, b) => b[1] - a[1]);
  const supervisorCounts = Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1]);

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Who's getting recognized?</SectionLabel>
            <input
              type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Type a name..."
              style={{ width: '100%', fontSize: 22, fontWeight: 700, color: NAVY, padding: '14px 16px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG }}
            />
            <div style={{ marginTop: 18, marginBottom: 8 }}><SectionLabel>Why</SectionLabel></div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {REASON_TAGS.map((tag) => (
                <TapChip key={tag} active={tags.includes(tag)} onClick={() => toggleTag(tag)} color={GOLD} light={GOLD_LIGHT} textColor="#7A5E1E">{tag}</TapChip>
              ))}
            </div>
            {!expanded ? (
              <button type="button" className="tap-target" onClick={() => setExpanded(true)} style={{ marginTop: 16, background: 'none', border: 'none', color: MID_BLUE, fontWeight: 700, fontSize: 13.5, cursor: 'pointer', padding: '6px 0' }}>
                + Add a note or point value
              </button>
            ) : (
              <div style={{ marginTop: 16 }}>
                <SectionLabel>Note (optional)</SectionLabel>
                <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="What happened..." rows={2}
                  style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical' }} />
                <div style={{ marginTop: 14, marginBottom: 8 }}><SectionLabel>Points (optional)</SectionLabel></div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {POINT_VALUES.map((p) => (
                    <button key={p} className="tap-target" onClick={() => setPoints(points === p ? null : p)}
                      style={{ padding: '8px 16px', borderRadius: 8, border: `2px solid ${points === p ? NAVY : LIGHT_BG}`, background: points === p ? NAVY : '#fff', color: points === p ? '#fff' : NAVY, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label="Stamp recognition" color={GOLD} shadow="rgba(201,162,75,0.4)" />
          {!supervisor && <HintRow text="Pick who you are above to enable this" />}
          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="Nothing logged yet. First one's the hardest — head to Log and stamp someone." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div style={{ fontSize: 17, fontWeight: 800, color: NAVY }}>{e.employeeName}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap', marginLeft: 10 }}>{timeAgo(e.ts)}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              {e.tags.map((t) => <Pill key={t} bg={GOLD_LIGHT} color="#7A5E1E">{t}</Pill>)}
            </div>
            {e.note && <div style={{ fontSize: 14, color: '#3A4A63', marginTop: 8, lineHeight: 1.4 }}>{e.note}</div>}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={GOLD} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Point totals and values are private to Mike" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Point totals by employee</div>
              {sortedTotals.length === 0 ? <EmptyState>No point values logged yet.</EmptyState> : (
                <RankedList items={sortedTotals} renderValue={(v) => `${v} pts`} highlightFirst={GOLD_LIGHT} highlightFirstText="#7A5E1E" />
              )}
              <div style={{ fontSize: 14, fontWeight: 800, color: NAVY, margin: '24px 0 10px' }}>Activity by supervisor</div>
              <RankedList items={supervisorCounts} renderValue={(v) => `${v} logged`} />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-recognition-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Employee', get: (e) => e.employeeName },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                  { label: 'Reasons', get: (e) => e.tags.join('; ') },
                  { label: 'Points', get: (e) => e.points || '' },
                  { label: 'Note', get: (e) => e.note },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

function QualityTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [partDesc, setPartDesc] = useState('');
  const [qty, setQty] = useState('1');
  const [defectType, setDefectType] = useState('');
  const [cause, setCause] = useState('');
  const [supplier, setSupplier] = useState('');
  const [lot, setLot] = useState('');
  const [lotCandidates, setLotCandidates] = useState([]);
  const [disposition, setDisposition] = useState('');
  const [note, setNote] = useState('');
  const [photos, setPhotos] = useState([]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('quality_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('quality_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const resetForm = () => {
    setPartDesc(''); setQty('1'); setDefectType(''); setCause(''); setSupplier(''); setLot(''); setDisposition(''); setNote(''); setPhotos([]); setLotCandidates([]);
  };

  const canSubmit = supervisor && partDesc.trim().length > 0 && defectType && cause && disposition;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const id = uid('q');
    let savedCount = 0;
    for (let i = 0; i < photos.length; i++) {
      try {
        const r = await storage.set(`quality_photo:${id}:${i}`, photos[i]);
        if (r) savedCount++;
      } catch { }
    }
    const entry = {
      id, partDesc: partDesc.trim(), qty: parseInt(qty, 10) || 1, defectType, cause,
      supplier: supplier || null, lot: lot.trim() || null, disposition, note: note.trim(), photoCount: savedCount,
      shift, supervisor, ts: Date.now(),
    };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const todayEntries = entries.filter((e) => isToday(e.ts));
  const weekEntries = entries.filter((e) => isThisWeek(e.ts));
  const scrapToday = todayEntries.filter((e) => e.disposition === 'scrap').reduce((s, e) => s + e.qty, 0);
  const holdToday = todayEntries.filter((e) => e.disposition === 'hold').length;

  const bySupplier = weekEntries.reduce((acc, e) => {
    const key = e.supplier || 'Unspecified';
    acc[key] = (acc[key] || 0) + e.qty;
    return acc;
  }, {});
  const byType = weekEntries.reduce((acc, e) => {
    acc[e.defectType] = (acc[e.defectType] || 0) + e.qty;
    return acc;
  }, {});
  const byCause = weekEntries.reduce((acc, e) => {
    acc[e.cause] = (acc[e.cause] || 0) + e.qty;
    return acc;
  }, {});

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'tally', label: 'Tally' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Part / item</SectionLabel>
            <input type="text" value={partDesc} onChange={(e) => setPartDesc(e.target.value)} placeholder="e.g. Damper blade 24x18"
              style={{ width: '100%', fontSize: 18, fontWeight: 700, color: NAVY, padding: '12px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG, marginBottom: 14 }} />

            <SectionLabel>Quantity affected</SectionLabel>
            <div style={{ display: 'flex', gap: 8, marginBottom: 14, alignItems: 'center' }}>
              <button className="tap-target" onClick={() => setQty((q) => String(Math.max(1, (parseInt(q, 10) || 1) - 1)))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: '#fff', fontSize: 20, fontWeight: 800, color: NAVY, cursor: 'pointer' }}>−</button>
              <input type="number" inputMode="numeric" value={qty} onChange={(e) => setQty(e.target.value.replace(/[^0-9]/g, ''))}
                style={{ width: 70, textAlign: 'center', fontSize: 18, fontWeight: 800, padding: '10px', borderRadius: 10, border: `2px solid ${LIGHT_BG}` }} />
              <button className="tap-target" onClick={() => setQty((q) => String((parseInt(q, 10) || 1) + 1))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: '#fff', fontSize: 20, fontWeight: 800, color: NAVY, cursor: 'pointer' }}>+</button>
            </div>

            <SectionLabel>Defect type</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {DEFECT_TYPES.map((t) => <TapChip key={t} active={defectType === t} onClick={() => setDefectType(t)} color={RED} light={RED_LIGHT}>{t}</TapChip>)}
            </div>

            <SectionLabel>Likely cause</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {CAUSE_TAGS.map((c) => <TapChip key={c} active={cause === c} onClick={() => setCause(c)} color={AMBER} light={AMBER_LIGHT}>{c}</TapChip>)}
            </div>

            <SectionLabel>Supplier / material</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {SUPPLIERS.map((s) => <TapChip key={s} active={supplier === s} onClick={() => setSupplier(s === supplier ? '' : s)} color={MID_BLUE} light={LIGHT_BG}>{s}</TapChip>)}
            </div>

            <SectionLabel>Photo of tag (optional, helps fill lot/P.O. below)</SectionLabel>
            <div style={{ marginBottom: 16 }}>
              <PhotoCaptureWithOCR photos={photos} onChange={setPhotos} onLotCandidates={setLotCandidates} />
            </div>

            <SectionLabel>Lot / P.O. number (optional)</SectionLabel>
            {lotCandidates.length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, marginBottom: 6 }}>Found on tag — tap to use, or type your own below:</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {lotCandidates.map((c) => (
                    <TapChip key={c} active={lot === c} onClick={() => setLot(c)} color={GREEN} light={GREEN_LIGHT}>{c}</TapChip>
                  ))}
                </div>
              </div>
            )}
            <input type="text" value={lot} onChange={(e) => setLot(e.target.value)} placeholder="If visible on material tag or P.O."
              style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 16 }} />
            {lot && lotCandidates.includes(lot) && (
              <div style={{ fontSize: 12, color: GREEN, fontWeight: 600, marginTop: -12, marginBottom: 16 }}>

              </div>
            )}

            <SectionLabel>Disposition</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>

            </div>

            <SectionLabel>Note (optional)</SectionLabel>

          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label="Log defect" color={RED} shadow="rgba(176,65,62,0.35)" />

          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'tally' && (
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>Today</div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 22, flexWrap: 'wrap' }}>
            <StatTile label="Defects logged" value={todayEntries.length} />
            <StatTile label="Units scrapped" value={scrapToday} color={RED} />
            <StatTile label="On hold" value={holdToday} color={AMBER} />
          </div>

          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>This week by supplier</div>
          {Object.keys(bySupplier).length === 0 ? <EmptyState>No defects logged this week.</EmptyState> : (
            <TallyBars data={bySupplier} color={MID_BLUE} />
          )}

          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, margin: '22px 0 10px' }}>This week by defect type</div>
          {Object.keys(byType).length === 0 ? <EmptyState>No defects logged this week.</EmptyState> : (
            <TallyBars data={byType} color={RED} />
          )}

          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, margin: '22px 0 10px' }}>This week by cause</div>
          {Object.keys(byCause).length === 0 ? <EmptyState>No defects logged this week.</EmptyState> : (
            <TallyBars data={byCause} color={AMBER} />
          )}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="No defects logged yet." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: NAVY }}>{e.partDesc} {e.qty > 1 && <span style={{ color: MID_BLUE, fontWeight: 700 }}>×{e.qty}</span>}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap' }}>{timeAgo(e.ts)}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              <Pill bg={RED_LIGHT} color={RED}>{e.defectType}</Pill>
              <Pill bg={AMBER_LIGHT} color={AMBER}>{e.cause}</Pill>
              {e.supplier && <Pill bg={LIGHT_BG} color={MID_BLUE}>{e.supplier}</Pill>}
              <Pill bg={DISPOSITIONS.find((d) => d.key === e.disposition)?.light} color={DISPOSITIONS.find((d) => d.key === e.disposition)?.color}>
                {DISPOSITIONS.find((d) => d.key === e.disposition)?.label}
              </Pill>
            </div>
            {e.lot && <div style={{ fontSize: 13, color: '#3A4A63', marginTop: 6 }}>Lot/P.O.: {e.lot}</div>}
            {e.note && <div style={{ fontSize: 14, color: '#3A4A63', marginTop: 6, lineHeight: 1.4 }}>{e.note}</div>}
            {e.photoCount > 0 && (
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 8 }}>
                {Array.from({ length: e.photoCount }).map((_, i) => (
                  <PhotoThumb key={i} storageKey={`quality_photo:${e.id}:${i}`} alt={`defect ${i + 1}`} />
                ))}
              </div>
            )}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={RED} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Full defect log access" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Logged by supervisor</div>
              <RankedList
                items={Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1])}
                renderValue={(v) => `${v} logged`}
              />
              <div style={{ fontSize: 14, fontWeight: 800, color: NAVY, margin: '24px 0 10px' }}>All-time by supplier</div>
              <RankedList
                items={Object.entries(entries.reduce((acc, e) => { const k = e.supplier || 'Unspecified'; acc[k] = (acc[k] || 0) + e.qty; return acc; }, {})).sort((a, b) => b[1] - a[1])}
                renderValue={(v) => `${v} units`}
              />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-quality-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Part', get: (e) => e.partDesc },
                  { label: 'Qty', get: (e) => e.qty },
                  { label: 'Defect Type', get: (e) => e.defectType },
                  { label: 'Cause', get: (e) => e.cause },
                  { label: 'Supplier', get: (e) => e.supplier || '' },
                  { label: 'Lot/P.O.', get: (e) => e.lot || '' },
                  { label: 'Disposition', get: (e) => DISPOSITIONS.find((d) => d.key === e.disposition)?.label || e.disposition },
                  { label: 'Photos', get: (e) => e.photoCount || 0 },
                  { label: 'Note', get: (e) => e.note },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

  const [unlocked, setUnlocked] = useState(false);

  const [type, setType] = useState('');
  const [area, setArea] = useState('');

  const [note, setNote] = useState('');
  const [photos, setPhotos] = useState([]);
  const [actionTaken, setActionTaken] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('ehs_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('ehs_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const resetForm = () => { setType(''); setArea(''); setPersonInvolved(''); setNote(''); setPhotos([]); setActionTaken(''); };

    };

            </div>

            <SectionLabel>Person involved (optional)</SectionLabel>
            <input type="text" value={personInvolved} onChange={(e) => setPersonInvolved(e.target.value)} placeholder="Name, if applicable"
              style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 16 }} />

            <SectionLabel>What happened</SectionLabel>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Describe the event..." rows={3}
              style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16 }} />

            <SectionLabel>Action taken (optional)</SectionLabel>
            <textarea value={actionTaken} onChange={(e) => setActionTaken(e.target.value)} placeholder="What was done immediately..." rows={2}
              style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16 }} />

            <SectionLabel>Photo</SectionLabel>
