// Storage shim: mirrors window.storage.get/set API but talks to Google Sheets backend.
// All tablets hit the same Sheet, so data is shared across the fleet automatically.
const storage = {
  async get(key) {
    try {
      const url = `${SHEETS_URL}?action=get&key=${encodeURIComponent(key)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.found && data.value !== null) return { key, value: data.value };
      return null;
    } catch {
      return null;
    }
  },
  async set(key, value) {
    try {
      const res = await fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'set', key, value }),
      });
      const data = await res.json();
      return data.success ? { key, value } : null;
    } catch {
      return null;
    }
  },
  async delete(key) {
    try {
      const res = await fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', key }),
      });
      const data = await res.json();
      return data.deleted ? { key, deleted: true } : null;
    } catch {
      return null;
    }
  },
};

function downloadCsv(filename, rows, columns) {
  const escape = (val) => {
    if (val === null || val === undefined) return '';
    const s = String(val);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  const header = columns.map((c) => escape(c.label)).join(',');
  const lines = rows.map((row) => columns.map((c) => escape(c.get(row))).join(','));
  const csv = [header, ...lines].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}
function isThisWeek(ts) {
  const weekMs = 7 * 24 * 60 * 60 * 1000;
  return Date.now() - ts <= weekMs;
}

// Shift boundaries (24h, minutes from midnight)
const SHIFT_BOUNDARIES = [
  { name: 'Day', startMin: 7 * 60 + 30, endMin: 15 * 60 + 30 },
  { name: 'Afternoon', startMin: 15 * 60 + 30, endMin: 23 * 60 + 30 },
  { name: 'Midnight', startMin: 23 * 60 + 30, endMin: 7 * 60 + 30 }, // crosses midnight
];

function dateAtMinutes(baseDate, minutes) {
  const d = new Date(baseDate);
  d.setHours(0, 0, 0, 0);
  d.setMinutes(minutes);
  return d;
}

// Returns { name, start: Date, end: Date } for the most recently COMPLETED shift,
// relative to "now". Handles the Midnight shift's wraparound across the date line.
function getJustEndedShift(now = new Date()) {
  const nowMin = now.getHours() * 60 + now.getMinutes();

  // Build today's three shift windows as absolute Date ranges, anchored to "now"'s calendar day,
  // accounting for Midnight shift starting the previous day when relevant.
  const candidates = [];

  for (const b of SHIFT_BOUNDARIES) {
    if (b.startMin < b.endMin) {
      // same-day shift (Day, Afternoon)
      const start = dateAtMinutes(now, b.startMin);
      const end = dateAtMinutes(now, b.endMin);
      candidates.push({ name: b.name, start, end });
      // also consider yesterday's instance, in case "now" is early morning before any shift ended today
      const startPrev = new Date(start); startPrev.setDate(startPrev.getDate() - 1);
      const endPrev = new Date(end); endPrev.setDate(endPrev.getDate() - 1);
      candidates.push({ name: b.name, start: startPrev, end: endPrev });
    } else {
      // overnight shift (Midnight): could end today (started yesterday) or end tomorrow (started today)
      const startToday = dateAtMinutes(now, b.startMin);
      const endTomorrow = dateAtMinutes(now, b.endMin);
      endTomorrow.setDate(endTomorrow.getDate() + 1);
      candidates.push({ name: b.name, start: startToday, end: endTomorrow });

      const startYesterday = new Date(startToday); startYesterday.setDate(startYesterday.getDate() - 1);
      const endToday = dateAtMinutes(now, b.endMin);
      candidates.push({ name: b.name, start: startYesterday, end: endToday });
    }
  }

  // Keep only shifts that have already ended (end <= now), pick the most recent one
  const ended = candidates.filter((c) => c.end.getTime() <= now.getTime());
  ended.sort((a, b) => b.end.getTime() - a.end.getTime());
  return ended[0] || candidates[0];
}

function formatShiftWindow(start, end) {
  const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
  return `${start.toLocaleString('en-US', opts)} \u2013 ${end.toLocaleString('en-US', opts)}`;
}

function fileToCompressedDataUrl(file, maxDim = 640, quality = 0.55) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- OCR-enabled photo capture (Quality tab: read lot/P.O. off a material tag) ----------

let tesseractLoadPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js';
    script.onload = () => resolve(window.Tesseract);
    script.onerror = () => reject(new Error('Failed to load OCR library'));
    document.head.appendChild(script);
  });
  return tesseractLoadPromise;
}

// Look for a plausible lot/P.O./order-style number in raw OCR text:
// a run of 5+ digits, optionally with a dash-suffix (e.g. "1582372" or "6060047-003").
function extractLikelyLotCandidates(rawText) {
  const matches = rawText.match(/\b\d{5,}(-\d{2,4})?\b/g) || [];
  // de-dupe, keep order of first appearance, cap at 5 suggestions
  const seen = new Set();
  const out = [];
  for (const m of matches) {
    if (!seen.has(m)) {
      seen.add(m);
      out.push(m);
    }
    if (out.length >= 5) break;
  }
  return out;
}

function PhotoCaptureWithOCR({ photo, onChange, onLotCandidates }) {
  const inputRef = useRef(null);
  const [ocrStatus, setOcrStatus] = useState('idle'); // idle | loading | running | done | error

  const runOcr = async (dataUrl) => {
    setOcrStatus('loading');
    try {
      const Tesseract = await loadTesseract();
      setOcrStatus('running');
      const result = await Tesseract.recognize(dataUrl, 'eng');
      const text = (result && result.data && result.data.text) || '';
      const candidates = extractLikelyLotCandidates(text);
      onLotCandidates(candidates);
      setOcrStatus('done');
    } catch {
      setOcrStatus('error');
      onLotCandidates([]);
    }
  };

  return (
    <div>
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        capture="environment"
        style={{ display: 'none' }}
        onChange={async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          try {
            const dataUrl = await fileToCompressedDataUrl(file, 1100, 0.75); // higher-res for OCR legibility
            onChange(dataUrl);
            runOcr(dataUrl);
          } catch {
            // silently ignore bad image read
          }
          e.target.value = '';
        }}
      />
      {photo ? (
        <div>
          <div style={{ position: 'relative', display: 'inline-block' }}>
            <img src={photo} alt="attached" style={{ width: 120, height: 120, objectFit: 'cover', borderRadius: 10, border: `2px solid ${LIGHT_BG}` }} />
            <button
              type="button"
              className="tap-target"
              onClick={() => { onChange(null); onLotCandidates([]); setOcrStatus('idle'); }}
              style={{
                position: 'absolute', top: -8, right: -8, width: 28, height: 28, borderRadius: '50%',
                background: RED, color: '#fff', border: '2px solid #fff', fontWeight: 800, fontSize: 14, cursor: 'pointer',
              }}
            >
              ×
            </button>
          </div>
          {(ocrStatus === 'loading' || ocrStatus === 'running') && (
            <div style={{ fontSize: 12.5, color: MID_BLUE, fontWeight: 600, marginTop: 8 }}>
              📖 Reading tag for lot/P.O. numbers...
            </div>
          )}
          {ocrStatus === 'error' && (
            <div style={{ fontSize: 12.5, color: AMBER, fontWeight: 600, marginTop: 8 }}>
              Couldn't read the tag automatically — type the number below.
            </div>
          )}
        </div>
      ) : (
        <button
          type="button"
          className="tap-target"
          onClick={() => inputRef.current && inputRef.current.click()}
          style={{
            display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', borderRadius: 10,
            border: `2px dashed ${MID_BLUE}`, background: LIGHT_BG, color: MID_BLUE, fontWeight: 700, fontSize: 14, cursor: 'pointer',
          }}
        >
          📷 Take photo of tag
        </button>
      )}
    </div>
  );
}

function PhotoThumb({ storageKey, alt }) {
  const [src, setSrc] = useState(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const result = await storage.get(storageKey);
        if (!cancelled) {
          if (result && result.value) setSrc(result.value);
          else setFailed(true);
        }
      } catch {
        if (!cancelled) setFailed(true);
      }
    })();
    return () => { cancelled = true; };
  }, [storageKey]);

  if (failed) return null;
  if (!src) {
    return (
      <div style={{ width: 100, height: 100, borderRadius: 10, marginTop: 8, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: MID_BLUE }}>
        loading...
      </div>
    );
  }
  return <img src={src} alt={alt} style={{ width: 100, height: 100, objectFit: 'cover', borderRadius: 10, marginTop: 8, border: `2px solid ${LIGHT_BG}` }} />;
}

function PinGate({ unlocked, setUnlocked, label, adminPin }) {
  const [pin, setPin] = useState('');
  const [pinError, setPinError] = useState(false);
  if (unlocked) return null;
  const tryUnlock = () => {
    if (pin === adminPin) {
      setUnlocked(true);
      setPinError(false);
    } else {
      setPinError(true);
      setTimeout(() => setPinError(false), 1200);
    }
  };
  return (
    <div style={{ background: '#fff', borderRadius: 14, padding: 28, textAlign: 'center', maxWidth: 320, margin: '40px auto', boxShadow: '0 1px 3px rgba(27,58,107,0.08)' }}>
      <div style={{ fontSize: 16, fontWeight: 800, color: NAVY, marginBottom: 4 }}>Admin only</div>
      <div style={{ fontSize: 13, color: MID_BLUE, marginBottom: 18 }}>{label}</div>
      <input
        type="password"
        inputMode="numeric"
        value={pin}
        onChange={(e) => setPin(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && tryUnlock()}
        placeholder="PIN"
        style={{
          width: '100%', fontSize: 18, textAlign: 'center', letterSpacing: 4, padding: '12px',
          borderRadius: 10, border: `2px solid ${pinError ? RED : LIGHT_BG}`, boxSizing: 'border-box', marginBottom: 14,
        }}
      />
      <button
        type="button"
        className="tap-target"
        onClick={tryUnlock}
        style={{ width: '100%', padding: '12px', borderRadius: 10, border: 'none', background: NAVY, color: '#fff', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}
      >
        Unlock
      </button>
      {pinError && <div style={{ color: RED, fontSize: 13, marginTop: 10 }}>Wrong PIN</div>}
    </div>
  );
}

      <IdentityBar shift={shift} setShift={setShift} supervisor={supervisor} setSupervisor={setSupervisor} />
      <div style={{ maxWidth: 640, margin: '0 auto', padding: '4px 16px 60px' }}>
        {tab === 'recognition' && <RecognitionTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'quality' && <QualityTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'ehs' && <EhsTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'production' && <ProductionTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'notes' && <NotesTab shift={shift} supervisor={supervisor} adminPin={ADMIN_PIN} />}
        {tab === 'handover' && <HandoverTab supervisor={supervisor} />}
      </div>
      <VersionFooter />
    </div>
  );
}

        0% { transform: scale(0.4) rotate(-8deg); opacity: 0; }
        60% { transform: scale(1.08) rotate(2deg); opacity: 1; }
        100% { transform: scale(1) rotate(-2deg); opacity: 1; }

      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(6px); }
        100% { opacity: 1; transform: translateY(0); }

function RecognitionTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [name, setName] = useState('');
  const [tags, setTags] = useState([]);
  const [note, setNote] = useState('');
  const [expanded, setExpanded] = useState(false);
  const [points, setPoints] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('recognitions');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('recognitions', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const toggleTag = (tag) => setTags((p) => (p.includes(tag) ? p.filter((t) => t !== tag) : [...p, tag]));
  const resetForm = () => { setName(''); setTags([]); setNote(''); setPoints(null); setExpanded(false); };
  const canSubmit = supervisor && name.trim().length > 0 && tags.length > 0;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const entry = { id: uid('r'), employeeName: name.trim(), shift, supervisor, tags, note: note.trim(), points: points || null, ts: Date.now() };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const totalsByEmployee = entries.reduce((acc, e) => {
    if (!e.points) return acc;
    acc[e.employeeName] = (acc[e.employeeName] || 0) + e.points;
    return acc;
  }, {});
  const sortedTotals = Object.entries(totalsByEmployee).sort((a, b) => b[1] - a[1]);
  const supervisorCounts = Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1]);

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Who's getting recognized?</SectionLabel>
            <input
              type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Type a name..."
              style={{ width: '100%', fontSize: 22, fontWeight: 700, color: NAVY, padding: '14px 16px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG }}
            />
            <div style={{ marginTop: 18, marginBottom: 8 }}><SectionLabel>Why</SectionLabel></div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {REASON_TAGS.map((tag) => (
                <TapChip key={tag} active={tags.includes(tag)} onClick={() => toggleTag(tag)} color={GOLD} light={GOLD_LIGHT} textColor="#7A5E1E">{tag}</TapChip>
              ))}
            </div>
            {!expanded ? (
              <button type="button" className="tap-target" onClick={() => setExpanded(true)} style={{ marginTop: 16, background: 'none', border: 'none', color: MID_BLUE, fontWeight: 700, fontSize: 13.5, cursor: 'pointer', padding: '6px 0' }}>
                + Add a note or point value
              </button>
            ) : (
              <div style={{ marginTop: 16 }}>
                <SectionLabel>Note (optional)</SectionLabel>
                <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="What happened..." rows={2}
                  style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical' }} />
                <div style={{ marginTop: 14, marginBottom: 8 }}><SectionLabel>Points (optional)</SectionLabel></div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {POINT_VALUES.map((p) => (
                    <button key={p} className="tap-target" onClick={() => setPoints(points === p ? null : p)}
                      style={{ padding: '8px 16px', borderRadius: 8, border: `2px solid ${points === p ? NAVY : LIGHT_BG}`, background: points === p ? NAVY : '#fff', color: points === p ? '#fff' : NAVY, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label="Stamp recognition" color={GOLD} shadow="rgba(201,162,75,0.4)" />
          {!supervisor && <HintRow text="Pick who you are above to enable this" />}
          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="Nothing logged yet. First one's the hardest — head to Log and stamp someone." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div style={{ fontSize: 17, fontWeight: 800, color: NAVY }}>{e.employeeName}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap', marginLeft: 10 }}>{timeAgo(e.ts)}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              {e.tags.map((t) => <Pill key={t} bg={GOLD_LIGHT} color="#7A5E1E">{t}</Pill>)}
            </div>
            {e.note && <div style={{ fontSize: 14, color: '#3A4A63', marginTop: 8, lineHeight: 1.4 }}>{e.note}</div>}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={GOLD} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Point totals and values are private to Mike" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Point totals by employee</div>
              {sortedTotals.length === 0 ? <EmptyState>No point values logged yet.</EmptyState> : (
                <RankedList items={sortedTotals} renderValue={(v) => `${v} pts`} highlightFirst={GOLD_LIGHT} highlightFirstText="#7A5E1E" />
              )}
              <div style={{ fontSize: 14, fontWeight: 800, color: NAVY, margin: '24px 0 10px' }}>Activity by supervisor</div>
              <RankedList items={supervisorCounts} renderValue={(v) => `${v} logged`} />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-recognition-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Employee', get: (e) => e.employeeName },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                  { label: 'Reasons', get: (e) => e.tags.join('; ') },
                  { label: 'Points', get: (e) => e.points || '' },
                  { label: 'Note', get: (e) => e.note },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

function QualityTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [partDesc, setPartDesc] = useState('');
  const [qty, setQty] = useState('1');
  const [defectType, setDefectType] = useState('');
  const [cause, setCause] = useState('');
  const [supplier, setSupplier] = useState('');
  const [lot, setLot] = useState('');
  const [lotCandidates, setLotCandidates] = useState([]);
  const [disposition, setDisposition] = useState('');
  const [note, setNote] = useState('');
  const [photo, setPhoto] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('quality_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('quality_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const resetForm = () => {
    setPartDesc(''); setQty('1'); setDefectType(''); setCause(''); setSupplier(''); setLot(''); setDisposition(''); setNote(''); setPhoto(null); setLotCandidates([]);
  };

  const canSubmit = supervisor && partDesc.trim().length > 0 && defectType && cause && disposition;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const id = uid('q');
    let photoSaved = false;
    if (photo) {
      try {
        const photoResult = await storage.set(`quality_photo:${id}`, photo);
        photoSaved = !!photoResult;
      } catch {
        photoSaved = false;
      }
    }
    const entry = {
      id, partDesc: partDesc.trim(), qty: parseInt(qty, 10) || 1, defectType, cause,
      supplier: supplier || null, lot: lot.trim() || null, disposition, note: note.trim(), hasPhoto: photoSaved,
      shift, supervisor, ts: Date.now(),
    };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const todayEntries = entries.filter((e) => isToday(e.ts));
  const weekEntries = entries.filter((e) => isThisWeek(e.ts));
  const scrapToday = todayEntries.filter((e) => e.disposition === 'scrap').reduce((s, e) => s + e.qty, 0);
  const holdToday = todayEntries.filter((e) => e.disposition === 'hold').length;

  const bySupplier = weekEntries.reduce((acc, e) => {
    const key = e.supplier || 'Unspecified';
    acc[key] = (acc[key] || 0) + e.qty;
    return acc;
  }, {});
  const byType = weekEntries.reduce((acc, e) => {
    acc[e.defectType] = (acc[e.defectType] || 0) + e.qty;
    return acc;
  }, {});
  const byCause = weekEntries.reduce((acc, e) => {
    acc[e.cause] = (acc[e.cause] || 0) + e.qty;
    return acc;
  }, {});

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'tally', label: 'Tally' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Part / item</SectionLabel>
            <input type="text" value={partDesc} onChange={(e) => setPartDesc(e.target.value)} placeholder="e.g. Damper blade 24x18"
              style={{ width: '100%', fontSize: 18, fontWeight: 700, color: NAVY, padding: '12px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG, marginBottom: 14 }} />

            <SectionLabel>Quantity affected</SectionLabel>
            <div style={{ display: 'flex', gap: 8, marginBottom: 14, alignItems: 'center' }}>
              <button className="tap-target" onClick={() => setQty((q) => String(Math.max(1, (parseInt(q, 10) || 1) - 1)))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: '#fff', fontSize: 20, fontWeight: 800, color: NAVY, cursor: 'pointer' }}>−</button>
              <input type="number" inputMode="numeric" value={qty} onChange={(e) => setQty(e.target.value.replace(/[^0-9]/g, ''))}
                style={{ width: 70, textAlign: 'center', fontSize: 18, fontWeight: 800, padding: '10px', borderRadius: 10, border: `2px solid ${LIGHT_BG}` }} />
              <button className="tap-target" onClick={() => setQty((q) => String((parseInt(q, 10) || 1) + 1))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: '#fff', fontSize: 20, fontWeight: 800, color: NAVY, cursor: 'pointer' }}>+</button>
            </div>

            <SectionLabel>Defect type</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {DEFECT_TYPES.map((t) => <TapChip key={t} active={defectType === t} onClick={() => setDefectType(t)} color={RED} light={RED_LIGHT}>{t}</TapChip>)}
            </div>

            <SectionLabel>Likely cause</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {CAUSE_TAGS.map((c) => <TapChip key={c} active={cause === c} onClick={() => setCause(c)} color={AMBER} light={AMBER_LIGHT}>{c}</TapChip>)}
            </div>

            <SectionLabel>Supplier / material</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {SUPPLIERS.map((s) => <TapChip key={s} active={supplier === s} onClick={() => setSupplier(s === supplier ? '' : s)} color={MID_BLUE} light={LIGHT_BG}>{s}</TapChip>)}
            </div>

            <SectionLabel>Photo of tag (optional, helps fill lot/P.O. below)</SectionLabel>
            <div style={{ marginBottom: 16 }}>
              <PhotoCaptureWithOCR photo={photo} onChange={setPhoto} onLotCandidates={setLotCandidates} />
            </div>

            <SectionLabel>Lot / P.O. number (optional)</SectionLabel>
            {lotCandidates.length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, marginBottom: 6 }}>Found on tag — tap to use, or type your own below:</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {lotCandidates.map((c) => (
                    <TapChip key={c} active={lot === c} onClick={() => setLot(c)} color={GREEN} light={GREEN_LIGHT}>{c}</TapChip>
                  ))}
                </div>
              </div>
            )}
            <input type="text" value={lot} onChange={(e) => setLot(e.target.value)} placeholder="If visible on material tag or P.O."
              style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 16 }} />
            {lot && lotCandidates.includes(lot) && (
              <div style={{ fontSize: 12, color: GREEN, fontWeight: 600, marginTop: -12, marginBottom: 16 }}>

    </div>
  );
}

function EhsTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [type, setType] = useState('');
  const [area, setArea] = useState('');
  const [personInvolved, setPersonInvolved] = useState('');
  const [note, setNote] = useState('');
  const [photo, setPhoto] = useState(null);
  const [actionTaken, setActionTaken] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('ehs_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('ehs_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const resetForm = () => { setType(''); setArea(''); setPersonInvolved(''); setNote(''); setPhoto(null); setActionTaken(''); };
  const canSubmit = supervisor && type && area;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const id = uid('e');
    let photoSaved = false;
    if (photo) {
      try {
        const photoResult = await storage.set(`ehs_photo:${id}`, photo);
        photoSaved = !!photoResult;
      } catch {
        photoSaved = false;
      }
    }
    const entry = {
      id, type, area, personInvolved: personInvolved.trim() || null, note: note.trim(),
      actionTaken: actionTaken.trim() || null, hasPhoto: photoSaved, shift, supervisor, ts: Date.now(),
    };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const todayEntries = entries.filter((e) => isToday(e.ts));
  const weekEntries = entries.filter((e) => isThisWeek(e.ts));
  const recordableWeek = weekEntries.filter((e) => e.type === 'Recordable incident').length;
  const nearMissWeek = weekEntries.filter((e) => e.type === 'Near miss').length;

  const byType = weekEntries.reduce((acc, e) => { acc[e.type] = (acc[e.type] || 0) + 1; return acc; }, {});
  const byArea = weekEntries.reduce((acc, e) => { acc[e.area] = (acc[e.area] || 0) + 1; return acc; }, {});

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'tally', label: 'Tally' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Type</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {EHS_TYPES.map((t) => <TapChip key={t} active={type === t} onClick={() => setType(t)} color={RED} light={RED_LIGHT}>{t}</TapChip>)}
            </div>

            <SectionLabel>Area</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {EHS_AREAS.map((a) => <TapChip key={a} active={area === a} onClick={() => setArea(a)} color={MID_BLUE} light={LIGHT_BG}>{a}</TapChip>)}
            </div>

            <SectionLabel>Person involved (optional)</SectionLabel>
            <input type="text" value={personInvolved} onChange={(e) => setPersonInvolved(e.target.value)} placeholder="Name, if applicable"
              style={{ width: '100%', fontSize: 15, padding: '10px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 16 }} />

            <SectionLabel>What happened</SectionLabel>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Describe the event..." rows={3}
              style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16 }} />

            <SectionLabel>Action taken (optional)</SectionLabel>
            <textarea value={actionTaken} onChange={(e) => setActionTaken(e.target.value)} placeholder="What was done immediately..." rows={2}
              style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16 }} />

            <SectionLabel>Photo</SectionLabel>
            <PhotoCapture photo={photo} onChange={setPhoto} />
          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label="Log EHS event" color={RED} shadow="rgba(176,65,62,0.35)" />
          {!supervisor && <HintRow text="Set your shift & name above to enable this" />}
          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'tally' && (
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>Today</div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 22, flexWrap: 'wrap' }}>
            <StatTile label="Events logged" value={todayEntries.length} />
            <StatTile label="Near misses (wk)" value={nearMissWeek} color={AMBER} />
            <StatTile label="Recordables (wk)" value={recordableWeek} color={RED} />
          </div>
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>This week by type</div>
          {Object.keys(byType).length === 0 ? <EmptyState>No EHS events logged this week.</EmptyState> : <TallyBars data={byType} color={RED} />}
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, margin: '22px 0 10px' }}>This week by area</div>
          {Object.keys(byArea).length === 0 ? <EmptyState>No EHS events logged this week.</EmptyState> : <TallyBars data={byArea} color={MID_BLUE} />}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="No EHS events logged yet." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: NAVY }}>{e.type}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap' }}>{timeAgo(e.ts)}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              <Pill bg={LIGHT_BG} color={MID_BLUE}>{e.area}</Pill>
              {e.personInvolved && <Pill bg={AMBER_LIGHT} color={AMBER}>{e.personInvolved}</Pill>}
            </div>
            {e.note && <div style={{ fontSize: 14, color: '#3A4A63', marginTop: 8, lineHeight: 1.4 }}>{e.note}</div>}
            {e.actionTaken && <div style={{ fontSize: 13, color: GREEN, marginTop: 6, fontWeight: 600 }}>Action: {e.actionTaken}</div>}
            {e.hasPhoto && <PhotoThumb storageKey={`ehs_photo:${e.id}`} alt="ehs" />}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={RED} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Full EHS log access" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Logged by supervisor</div>
              <RankedList
                items={Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1])}
                renderValue={(v) => `${v} logged`}
              />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-ehs-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Type', get: (e) => e.type },
                  { label: 'Area', get: (e) => e.area },
                  { label: 'Person Involved', get: (e) => e.personInvolved || '' },
                  { label: 'What Happened', get: (e) => e.note },
                  { label: 'Action Taken', get: (e) => e.actionTaken || '' },
                  { label: 'Has Photo', get: (e) => (e.hasPhoto ? 'Yes' : 'No') },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

function ProductionTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [lineNumber, setLineNumber] = useState(''); // e.g. 'Line 1', only used when pairing with a station
  const [station, setStation] = useState(''); // e.g. 'Saw', paired with lineNumber
  const [standaloneArea, setStandaloneArea] = useState(''); // e.g. 'CNC', 'LS 1', 'Foaming', 'Other'
  const [eventKind, setEventKind] = useState('downtime'); // downtime | target
  const [reason, setReason] = useState('');
  const [minutes, setMinutes] = useState('15');
  const [unitsGood, setUnitsGood] = useState('');
  const [unitsTarget, setUnitsTarget] = useState('');
  const [note, setNote] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('production_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('production_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const line = standaloneArea ? standaloneArea : (lineNumber && station ? `${lineNumber} \u2014 ${station}` : '');

  const resetForm = () => { setLineNumber(''); setStation(''); setStandaloneArea(''); setReason(''); setMinutes('15'); setUnitsGood(''); setUnitsTarget(''); setNote(''); };
  const canSubmit = supervisor && line && (eventKind === 'downtime' ? reason : unitsGood);

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const entry = {
      id: uid('p'), kind: eventKind, line, reason: eventKind === 'downtime' ? reason : null,
      minutes: eventKind === 'downtime' ? parseInt(minutes, 10) || 0 : null,
      unitsGood: eventKind === 'target' ? parseInt(unitsGood, 10) || 0 : null,
      unitsTarget: eventKind === 'target' ? parseInt(unitsTarget, 10) || 0 : null,
      note: note.trim(), shift, supervisor, ts: Date.now(),
    };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const todayEntries = entries.filter((e) => isToday(e.ts));
  const weekEntries = entries.filter((e) => isThisWeek(e.ts));
  const downtimeTodayMin = todayEntries.filter((e) => e.kind === 'downtime').reduce((s, e) => s + (e.minutes || 0), 0);
  const goodToday = todayEntries.filter((e) => e.kind === 'target').reduce((s, e) => s + (e.unitsGood || 0), 0);
  const targetToday = todayEntries.filter((e) => e.kind === 'target').reduce((s, e) => s + (e.unitsTarget || 0), 0);

  const downtimeByReason = weekEntries.filter((e) => e.kind === 'downtime').reduce((acc, e) => { acc[e.reason] = (acc[e.reason] || 0) + (e.minutes || 0); return acc; }, {});
  const downtimeByLine = weekEntries.filter((e) => e.kind === 'downtime').reduce((acc, e) => { acc[e.line] = (acc[e.line] || 0) + (e.minutes || 0); return acc; }, {});

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'tally', label: 'Tally' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Line</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: lineNumber ? 12 : 16 }}>
              {LINE_NUMBERS.map((l) => (
                <TapChip
                  key={l}
                  active={lineNumber === l}
                  onClick={() => { setLineNumber(lineNumber === l ? '' : l); setStation(''); setStandaloneArea(''); }}
                  color={NAVY}
                  light={LIGHT_BG}
                >
                  {l.replace('Line ', '')}
                </TapChip>
              ))}
            </div>

            {lineNumber && (
              <div style={{ marginBottom: 16 }}>
                <SectionLabel>Station on {lineNumber}</SectionLabel>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                  {LINE_STATIONS.map((s) => (
                    <TapChip key={s} active={station === s} onClick={() => setStation(station === s ? '' : s)} color={ACCENT_BLUE} light={LIGHT_BG}>
                      {s}
                    </TapChip>
                  ))}
                </div>
              </div>
            )}

            <SectionLabel>Or a standalone area</SectionLabel>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
              {STANDALONE_AREAS.map((a) => (
                <TapChip
                  key={a}
                  active={standaloneArea === a}
                  onClick={() => { setStandaloneArea(standaloneArea === a ? '' : a); setLineNumber(''); setStation(''); }}
                  color={MID_BLUE}
                  light={LIGHT_BG}
                >
                  {a}
                </TapChip>
              ))}
            </div>

            {line && (
              <div style={{ fontSize: 13, fontWeight: 700, color: ACCENT_BLUE, marginBottom: 16, marginTop: -8 }}>
                Selected: {line}
              </div>
            )}

            <SectionLabel>What are you logging</SectionLabel>
            <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
              <button className="tap-target" onClick={() => setEventKind('downtime')}
                style={{ flex: 1, padding: '12px 8px', borderRadius: 10, border: `2px solid ${eventKind === 'downtime' ? AMBER : LIGHT_BG}`, background: eventKind === 'downtime' ? AMBER_LIGHT : '#fff', color: eventKind === 'downtime' ? '#8A5C1E' : NAVY, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                Downtime
              </button>
              <button className="tap-target" onClick={() => setEventKind('target')}
                style={{ flex: 1, padding: '12px 8px', borderRadius: 10, border: `2px solid ${eventKind === 'target' ? GREEN : LIGHT_BG}`, background: eventKind === 'target' ? GREEN_LIGHT : '#fff', color: eventKind === 'target' ? '#2A6B41' : NAVY, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                Output count
              </button>
            </div>

            {eventKind === 'downtime' ? (
              <>
                <SectionLabel>Reason</SectionLabel>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
                  {DOWNTIME_REASONS.map((r) => <TapChip key={r} active={reason === r} onClick={() => setReason(r)} color={AMBER} light={AMBER_LIGHT}>{r}</TapChip>)}
                </div>
                <SectionLabel>Duration (minutes)</SectionLabel>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
                  {[5, 15, 30, 60, 120].map((m) => (
                    <button key={m} className="tap-target" onClick={() => setMinutes(String(m))}
                      style={{ padding: '8px 16px', borderRadius: 8, border: `2px solid ${minutes === String(m) ? NAVY : LIGHT_BG}`, background: minutes === String(m) ? NAVY : '#fff', color: minutes === String(m) ? '#fff' : NAVY, fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                      {m}
                    </button>
                  ))}
                  <input type="number" inputMode="numeric" value={minutes} onChange={(e) => setMinutes(e.target.value.replace(/[^0-9]/g, ''))}
                    style={{ width: 70, textAlign: 'center', fontSize: 14, fontWeight: 700, padding: '8px', borderRadius: 8, border: `2px solid ${LIGHT_BG}` }} />
                </div>
              </>
            ) : (
              <>
                <SectionLabel>Good units produced</SectionLabel>
                <input type="number" inputMode="numeric" value={unitsGood} onChange={(e) => setUnitsGood(e.target.value.replace(/[^0-9]/g, ''))} placeholder="0"
                  style={{ width: '100%', fontSize: 18, fontWeight: 700, padding: '12px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 14 }} />
                <SectionLabel>Target for period (optional)</SectionLabel>
                <input type="number" inputMode="numeric" value={unitsTarget} onChange={(e) => setUnitsTarget(e.target.value.replace(/[^0-9]/g, ''))} placeholder="0"
                  style={{ width: '100%', fontSize: 18, fontWeight: 700, padding: '12px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, marginBottom: 16 }} />
              </>
            )}

            <SectionLabel>Note (optional)</SectionLabel>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Anything else worth recording..." rows={2}
              style={{ width: '100%', fontSize: 15, padding: '10px 12px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical' }} />
          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label={eventKind === 'downtime' ? 'Log downtime' : 'Log output'} color={eventKind === 'downtime' ? AMBER : GREEN} shadow={eventKind === 'downtime' ? 'rgba(201,133,47,0.35)' : 'rgba(62,139,92,0.35)'} />
          {!supervisor && <HintRow text="Set your shift & name above to enable this" />}
          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'tally' && (
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>Today</div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 22, flexWrap: 'wrap' }}>
            <StatTile label="Downtime (min)" value={downtimeTodayMin} color={AMBER} />
            <StatTile label="Good units" value={goodToday} color={GREEN} />
            <StatTile label="Target" value={targetToday} />
          </div>
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, marginBottom: 10 }}>This week — downtime by reason (min)</div>
          {Object.keys(downtimeByReason).length === 0 ? <EmptyState>No downtime logged this week.</EmptyState> : <TallyBars data={downtimeByReason} color={AMBER} />}
          <div style={{ fontSize: 15, fontWeight: 800, color: NAVY, margin: '22px 0 10px' }}>This week — downtime by line (min)</div>
          {Object.keys(downtimeByLine).length === 0 ? <EmptyState>No downtime logged this week.</EmptyState> : <TallyBars data={downtimeByLine} color={NAVY} />}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="No production events logged yet." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: NAVY }}>{e.line}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap' }}>{timeAgo(e.ts)}</div>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              {e.kind === 'downtime' ? (
                <>
                  <Pill bg={AMBER_LIGHT} color={AMBER}>{e.reason}</Pill>
                  <Pill bg={LIGHT_BG} color={MID_BLUE}>{e.minutes} min</Pill>
                </>
              ) : (
                <>
                  <Pill bg={GREEN_LIGHT} color={GREEN}>{e.unitsGood} good</Pill>
                  {e.unitsTarget ? <Pill bg={LIGHT_BG} color={MID_BLUE}>target {e.unitsTarget}</Pill> : null}
                </>
              )}
            </div>
            {e.note && <div style={{ fontSize: 14, color: '#3A4A63', marginTop: 8, lineHeight: 1.4 }}>{e.note}</div>}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={NAVY} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Full production log access" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Logged by supervisor</div>
              <RankedList
                items={Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1])}
                renderValue={(v) => `${v} logged`}
              />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-production-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Kind', get: (e) => (e.kind === 'downtime' ? 'Downtime' : 'Output') },
                  { label: 'Line', get: (e) => e.line },
                  { label: 'Reason', get: (e) => e.reason || '' },
                  { label: 'Minutes', get: (e) => e.minutes ?? '' },
                  { label: 'Good Units', get: (e) => e.unitsGood ?? '' },
                  { label: 'Target Units', get: (e) => e.unitsTarget ?? '' },
                  { label: 'Note', get: (e) => e.note },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ============================================================
// NOTES TAB
// ============================================================

function NotesTab({ shift, supervisor, adminPin }) {
  const [view, setView] = useState('log');
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [justStamped, setJustStamped] = useState(null);
  const [storageError, setStorageError] = useState(false);
  const [unlocked, setUnlocked] = useState(false);

  const [text, setText] = useState('');
  const [photo, setPhoto] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const result = await storage.get('notes_entries');
      setEntries(result && result.value ? JSON.parse(result.value) : []);
    } catch {
      setEntries([]);
    } finally {
      setLoading(false);
    }
  }, []);
  useEffect(() => { load(); }, [load]);

  const save = async (next) => {
    try {
      const result = await storage.set('notes_entries', JSON.stringify(next));
      if (!result) { setStorageError(true); return false; }
      return true;
    } catch {
      setStorageError(true);
      return false;
    }
  };

  const resetForm = () => { setText(''); setPhoto(null); };
  const canSubmit = supervisor && text.trim().length > 0;

  const handleSubmit = async () => {
    if (!canSubmit || saving) return;
    setSaving(true);
    const id = uid('n');
    let photoSaved = false;
    if (photo) {
      try {
        const photoResult = await storage.set(`notes_photo:${id}`, photo);
        photoSaved = !!photoResult;
      } catch {
        photoSaved = false;
      }
    }
    const entry = { id, text: text.trim(), hasPhoto: photoSaved, shift, supervisor, ts: Date.now() };
    const next = [entry, ...entries];
    setEntries(next);
    const ok = await save(next);
    setSaving(false);
    if (ok) {
      setJustStamped(entry.id);
      setTimeout(() => setJustStamped(null), 1800);
      resetForm();
    }
  };

  const supervisorCounts = Object.entries(entries.reduce((acc, e) => { acc[e.supervisor] = (acc[e.supervisor] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1]);

  return (
    <div>
      <SubNav view={view} setView={setView} options={[{ key: 'log', label: 'Log' }, { key: 'history', label: 'Feed' }, { key: 'admin', label: 'Admin' }]} />

      {view === 'log' && (
        <div>
          <Card>
            <SectionLabel>Note</SectionLabel>
            <textarea
              value={text} onChange={(e) => setText(e.target.value)} placeholder="Anything worth recording — handoff info, a maintenance need, an observation..."
              rows={6}
              style={{ width: '100%', fontSize: 16, padding: '14px 16px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, background: LIGHT_BG, fontFamily: 'inherit', resize: 'vertical', marginBottom: 16 }}
            />
            <SectionLabel>Photo</SectionLabel>
            <PhotoCapture photo={photo} onChange={setPhoto} />
          </Card>
          <SubmitButton onClick={handleSubmit} disabled={!canSubmit || saving} saving={saving} label="Save note" color={MID_BLUE} shadow="rgba(46,95,163,0.35)" />
          {!supervisor && <HintRow text="Set your shift & name above to enable this" />}
          {storageError && <ErrorRow />}
        </div>
      )}

      {view === 'history' && (
        <FeedList entries={entries} loading={loading} justStamped={justStamped} empty="No notes logged yet." renderItem={(e) => (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
              <div style={{ fontSize: 14, color: '#3A4A63', lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>{e.text}</div>
              <div style={{ fontSize: 12, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap' }}>{timeAgo(e.ts)}</div>
            </div>
            {e.hasPhoto && <PhotoThumb storageKey={`notes_photo:${e.id}`} alt="note" />}
            <MetaLine>{e.shift} shift · logged by {e.supervisor}</MetaLine>
          </>
        )} accentColor={MID_BLUE} />
      )}

      {view === 'admin' && (
        <>
          <PinGate unlocked={unlocked} setUnlocked={setUnlocked} adminPin={adminPin} label="Full notes log access" />
          {unlocked && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: NAVY, marginBottom: 14 }}>Logged by supervisor</div>
              <RankedList items={supervisorCounts} renderValue={(v) => `${v} logged`} />
              <ExportButton
                label="Export full log to CSV"
                onClick={() => downloadCsv('tamco-notes-log.csv', entries, [
                  { label: 'Date', get: (e) => new Date(e.ts).toLocaleString() },
                  { label: 'Note', get: (e) => e.text },
                  { label: 'Has Photo', get: (e) => (e.hasPhoto ? 'Yes' : 'No') },
                  { label: 'Shift', get: (e) => e.shift },
                  { label: 'Supervisor', get: (e) => e.supervisor },
                ])}
              />
              <LockButton onClick={() => setUnlocked(false)} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ============================================================
// HANDOVER TAB
// ============================================================

const HANDOVER_SOURCES = [
  { key: 'recognitions', label: 'Recognition', color: GOLD, light: GOLD_LIGHT, icon: '★' },
  { key: 'quality_entries', label: 'Quality', color: RED, light: RED_LIGHT, icon: '◆' },
  { key: 'ehs_entries', label: 'EHS', color: RED, light: RED_LIGHT, icon: '⚑' },
  { key: 'production_entries', label: 'Production', color: AMBER, light: AMBER_LIGHT, icon: '▣' },
  { key: 'notes_entries', label: 'Notes', color: MID_BLUE, light: LIGHT_BG, icon: '✎' },
];

function summarizeEntry(sourceKey, e) {
  switch (sourceKey) {
    case 'recognitions':
      return { title: e.employeeName, sub: e.tags.join(', '), note: e.note };
    case 'quality_entries': {
      const dispLabel = DISPOSITIONS.find((d) => d.key === e.disposition)?.label || e.disposition;
      return { title: `${e.partDesc}${e.qty > 1 ? ' ×' + e.qty : ''}`, sub: `${e.defectType} · ${e.cause} · ${dispLabel}${e.supplier ? ' · ' + e.supplier : ''}`, note: e.note };
    }
    case 'ehs_entries':
      return { title: e.type, sub: e.area + (e.personInvolved ? ' · ' + e.personInvolved : ''), note: e.note };
    case 'production_entries':
      return e.kind === 'downtime'
        ? { title: `${e.line} — Downtime`, sub: `${e.reason} · ${e.minutes} min`, note: e.note }
        : { title: `${e.line} — Output`, sub: `${e.unitsGood} good${e.unitsTarget ? ' / target ' + e.unitsTarget : ''}`, note: e.note };
    case 'notes_entries':
      return { title: e.text, sub: '', note: '' };
    default:
      return { title: '', sub: '', note: '' };
  }
}

function HandoverTab({ supervisor }) {
  const [now] = useState(() => new Date());
  const [shiftWindow] = useState(() => getJustEndedShift(new Date()));
  const [dataBySource, setDataBySource] = useState({});
  const [loading, setLoading] = useState(true);
  const [comment, setComment] = useState('');
  const [savedComment, setSavedComment] = useState('');
  const [saving, setSaving] = useState(false);
  const [storageError, setStorageError] = useState(false);

  const commentKey = `handover_comment:${shiftWindow.name}:${shiftWindow.end.toISOString().slice(0, 10)}_${shiftWindow.end.getHours()}${shiftWindow.end.getMinutes()}`;

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const results = await Promise.all(
        HANDOVER_SOURCES.map((s) => storage.get(s.key).catch(() => null))
      );
      const next = {};
      HANDOVER_SOURCES.forEach((s, i) => {
        const r = results[i];
        const all = r && r.value ? JSON.parse(r.value) : [];
        next[s.key] = all.filter((e) => e.ts >= shiftWindow.start.getTime() && e.ts <= shiftWindow.end.getTime());
      });
      setDataBySource(next);

      const commentResult = await storage.get(commentKey).catch(() => null);
      if (commentResult && commentResult.value) {
        setSavedComment(commentResult.value);
        setComment(commentResult.value);
      }
    } finally {
      setLoading(false);
    }
  }, [shiftWindow, commentKey]);

  useEffect(() => { load(); }, [load]);

  const saveComment = async () => {
    setSaving(true);
    try {
      const result = await storage.set(commentKey, comment.trim());
      if (!result) { setStorageError(true); }
      else { setSavedComment(comment.trim()); setStorageError(false); }
    } catch {
      setStorageError(true);
    } finally {
      setSaving(false);
    }
  };

  const totalCount = Object.values(dataBySource).reduce((s, arr) => s + (arr ? arr.length : 0), 0);

  return (
    <div>
      <Card style={{ background: NAVY }}>
        <div style={{ color: '#fff', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, opacity: 0.75 }}>
          Shift handover
        </div>
        <div style={{ color: '#fff', fontSize: 22, fontWeight: 800, marginTop: 4 }}>{shiftWindow.name} shift</div>
        <div style={{ color: LIGHT_BG, fontSize: 13, marginTop: 2, opacity: 0.85 }}>{formatShiftWindow(shiftWindow.start, shiftWindow.end)}</div>
      </Card>

      {loading ? (
        <div style={{ textAlign: 'center', color: MID_BLUE, padding: 40 }}>Loading shift activity...</div>
      ) : (
        <>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 18 }}>
            {HANDOVER_SOURCES.map((s) => (
              <StatTile key={s.key} label={s.label} value={(dataBySource[s.key] || []).length} color={s.color} />
            ))}
          </div>

          {totalCount === 0 ? (
            <EmptyState>Nothing logged this shift across any tab.</EmptyState>
          ) : (
            HANDOVER_SOURCES.map((s) => {
              const items = dataBySource[s.key] || [];
              if (items.length === 0) return null;
              return (
                <div key={s.key} style={{ marginBottom: 18 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: NAVY, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span>{s.icon}</span> {s.label} <span style={{ color: MID_BLUE, fontWeight: 600 }}>({items.length})</span>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {items.map((e) => {
                      const sum = summarizeEntry(s.key, e);
                      return (
                        <div key={e.id} style={{ background: '#fff', borderRadius: 12, padding: '12px 14px', boxShadow: '0 1px 3px rgba(27,58,107,0.08)', borderLeft: `4px solid ${s.color}` }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
                            <div style={{ fontSize: 15, fontWeight: 700, color: NAVY }}>{sum.title}</div>
                            <div style={{ fontSize: 11.5, color: MID_BLUE, fontWeight: 600, whiteSpace: 'nowrap' }}>{timeAgo(e.ts)}</div>
                          </div>
                          {sum.sub && <div style={{ fontSize: 13, color: MID_BLUE, marginTop: 3 }}>{sum.sub}</div>}
                          {sum.note && <div style={{ fontSize: 13.5, color: '#3A4A63', marginTop: 5, lineHeight: 1.4 }}>{sum.note}</div>}
                          <MetaLine>{e.shift} · {e.supervisor}</MetaLine>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })
          )}

          <Card>
            <SectionLabel>Handover comments {supervisor ? `(${supervisor})` : ''}</SectionLabel>
            <textarea
              value={comment} onChange={(e) => setComment(e.target.value)}
              placeholder="Anything the next shift needs to know that isn't already captured above..."
              rows={4}
              style={{ width: '100%', fontSize: 15, padding: '12px 14px', borderRadius: 10, border: `2px solid ${LIGHT_BG}`, fontFamily: 'inherit', resize: 'vertical', marginBottom: 12 }}
            />
            <SubmitButton onClick={saveComment} disabled={!supervisor || saving} saving={saving} label={savedComment ? 'Update comment' : 'Save comment'} color={MID_BLUE} shadow="rgba(46,95,163,0.35)" />
            {!supervisor && <HintRow text="Set your shift & name above to save a comment" />}
            {storageError && <ErrorRow />}
          </Card>
        </>
      )}
    </div>
  );
}

// ============================================================
// SHARED UI PIECES
// ============================================================

function SubmitButton({ onClick, disabled, saving, label, color, shadow }) {
  return (
    <button
      type="button"
      className="tap-target"
      onClick={onClick}
      disabled={disabled}
      style={{
        width: '100%', padding: '18px', borderRadius: 14, border: 'none',
        background: disabled ? '#C9CFDB' : color, color: disabled ? '#8B93A6' : '#fff',
        fontWeight: 800, fontSize: 17, letterSpacing: 0.3, cursor: disabled ? 'not-allowed' : 'pointer',
        boxShadow: disabled ? 'none' : `0 4px 14px ${shadow}`, transition: 'all 0.15s',
      }}
    >
      {saving ? 'Saving...' : label}
    </button>
  );
}

function HintRow({ text }) {
  return <div style={{ textAlign: 'center', color: MID_BLUE, fontSize: 13, marginTop: 10 }}>{text}</div>;
}
function ErrorRow() {
  return <div style={{ textAlign: 'center', color: RED, fontSize: 13, marginTop: 10 }}>Couldn't save — check connection and try again.</div>;
}
function MetaLine({ children }) {
  return <div style={{ fontSize: 12, color: MID_BLUE, marginTop: 8, opacity: 0.8 }}>{children}</div>;
}
function Pill({ children, bg, color }) {
  return <span style={{ fontSize: 12, fontWeight: 600, background: bg, color, padding: '3px 10px', borderRadius: 999 }}>{children}</span>;
}
function LockButton({ onClick }) {
  return (
    <button type="button" className="tap-target" onClick={onClick}
      style={{ marginTop: 18, background: 'none', border: 'none', color: MID_BLUE, fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
      Lock admin view
    </button>
  );
}

function FeedList({ entries, loading, justStamped, empty, renderItem, accentColor }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: NAVY }}>Recent entries</div>
        <div style={{ fontSize: 13, color: MID_BLUE, fontWeight: 600 }}>{entries.length} total</div>
      </div>
      {loading ? (
        <div style={{ textAlign: 'center', color: MID_BLUE, padding: 40 }}>Loading...</div>
      ) : entries.length === 0 ? (
        <EmptyState>{empty}</EmptyState>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {entries.map((e) => (
            <div key={e.id} className={`entry-row ${justStamped === e.id ? 'stamp-badge' : ''}`}
              style={{ background: '#fff', borderRadius: 12, padding: '14px 16px', boxShadow: '0 1px 3px rgba(27,58,107,0.08)', borderLeft: `4px solid ${accentColor}` }}>
              {renderItem(e)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RankedList({ items, renderValue, highlightFirst, highlightFirstText }) {
  if (items.length === 0) return <EmptyState>No activity yet.</EmptyState>;
  return (
    <div style={{ background: '#fff', borderRadius: 14, overflow: 'hidden', boxShadow: '0 1px 3px rgba(27,58,107,0.08)' }}>
      {items.map(([k, v], i) => (
        <div key={k} style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 18px',
          borderTop: i === 0 ? 'none' : `1px solid ${LIGHT_BG}`, background: i === 0 && highlightFirst ? highlightFirst : '#fff',
        }}>
          <div style={{ fontWeight: 700, color: NAVY, fontSize: 15 }}>{k}</div>
          <div style={{ fontWeight: 800, color: i === 0 && highlightFirstText ? highlightFirstText : MID_BLUE, fontSize: 16 }}>{renderValue(v)}</div>
        </div>
      ))}
    </div>
  );
}

function TallyBars({ data, color }) {
  const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
  const max = Math.max(...entries.map(([, v]) => v), 1);
  return (
    <Card style={{ marginBottom: 0 }}>
      {entries.map(([k, v], i) => (
        <div key={k} style={{ marginBottom: i === entries.length - 1 ? 0 : 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13.5, fontWeight: 700, color: NAVY, marginBottom: 4 }}>
            <span>{k}</span>
            <span>{v}</span>
          </div>
          <div style={{ background: LIGHT_BG, borderRadius: 6, height: 10, overflow: 'hidden' }}>
            <div style={{ width: `${(v / max) * 100}%`, background: color, height: '100%', borderRadius: 6, transition: 'width 0.3s' }} />
          </div>
        </div>
      ))}
    </Card>
  );
}

    const domContainer = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(domContainer);
    reactRoot.render(React.createElement(TamcoFloorOps));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('root').style.display = 'block';
  </script>
